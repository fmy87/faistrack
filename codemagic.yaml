workflows:
  ios-release:
    name: FaisTrack iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faistrack.app
      vars:
        XCODE_PROJECT: "FaisTrack.xcodeproj"
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
        APP_STORE_APPLE_ID: "REPLACE_WITH_APP_STORE_ID"
        GOOGLE_MAPS_API_KEY: "REPLACE_WITH_GOOGLE_MAPS_KEY"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install GoogleService-Info.plist from Codemagic env
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  ios-debug:
    name: FaisTrack iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install GoogleService-Info.plist from Codemagic env
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build Debug
        script: |
          xcodebuild \
            -workspace $CM_BUILD_DIR/FaisTrack.xcworkspace \
            -scheme FaisTrack \
            -configuration Debug \
            -destination generic/platform=iOS \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
