workflows:
  ios-debug:
    name: FaisTrack iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build Debug
        script: |
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-release:
    name: FaisTrack iOS Release (configure App Store Connect first)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faistrack.app
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
