workflows:
  ios-debug:
    name: FaisTrack iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build Debug
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild_logs/build.log; exit ${PIPESTATUS[0]}
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: FaisTrack TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
        APP_STORE_APP_ID: "6783632037"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist

          # --- Safe diagnostics (no secret material printed) ---
          echo "GoogleService-Info.plist byte count: $(wc -c < $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist)"
          echo "plutil validity check:"
          plutil -lint $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
          echo "BUNDLE_ID in plist:"
          plutil -extract BUNDLE_ID raw $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist 2>&1
          echo "Expected BUNDLE_ID: $BUNDLE_ID"
          echo "GOOGLE_APP_ID in plist:"
          plutil -extract GOOGLE_APP_ID raw $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist 2>&1
          # --- end diagnostics ---

      - name: Inject Google Maps API key
        script: |
          # Adds/updates the GMSApiKey entry in Info.plist from the
          # GOOGLE_MAPS_API_KEY env var (set in the "faistrack" group).
          # AppDelegate.swift reads this key at runtime via
          # Bundle.main.object(forInfoDictionaryKey: "GMSApiKey").
          INFO_PLIST="$CM_BUILD_DIR/FaisTrack/Supporting/Info.plist"
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "WARNING: GOOGLE_MAPS_API_KEY is not set. Map features will not work in this build."
          else
            /usr/libexec/PlistBuddy -c "Add :GMSApiKey string $GOOGLE_MAPS_API_KEY" "$INFO_PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :GMSApiKey $GOOGLE_MAPS_API_KEY" "$INFO_PLIST"
            echo "GMSApiKey injected into Info.plist (length: ${#GOOGLE_MAPS_API_KEY} chars)"
          fi

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Prepare signing keys
        script: |
          # Decode ASC API key
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8

          # NOTE: We no longer use the stored $CERTIFICATE_PRIVATE_KEY secret.
          # Diagnostics showed it decodes to a well-formed PEM (correct
          # BEGIN/END markers, plausible byte length) but fails
          # `openssl rsa -check` with a p*q != n error — the key bytes
          # themselves are corrupted, not just mis-encoded.
          #
          # `app-store-connect certificates create` does NOT auto-generate a
          # key on its own — it requires --certificate-key to be given
          # explicitly (confirmed: omitting it errors "Cannot create resource
          # without certificate private key"). Since this workflow deletes
          # and recreates the distribution certificate on every build anyway,
          # we just generate a fresh, valid RSA 2048 key ourselves each run.
          openssl genrsa -out /tmp/cert_key.pem 2048
          echo "Generated fresh cert key. openssl rsa check:"
          openssl rsa -in /tmp/cert_key.pem -check -noout

      - name: Setup iOS Distribution certificate
        script: |
          ASC_KEY="@file:/tmp/asc_key.p8"
          KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          ISS_ID="$APP_STORE_CONNECT_ISSUER_ID"

          # codemagic-cli-tools auto-detects CERTIFICATE_PRIVATE_KEY as a default
          # value for --certificate-key even when the flag isn't passed explicitly.
          # The stored value is corrupted, so unset it to make sure it can't be
          # picked up in place of the freshly generated /tmp/cert_key.pem below.
          unset CERTIFICATE_PRIVATE_KEY

          # Delete any existing IOS_DISTRIBUTION certs (ignore errors if none exist)
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
            --json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(x['id']) for x in (d if isinstance(d,list) else d.get('data',[]))]" 2>/dev/null \
            | xargs -I{} app-store-connect certificates delete "{}" \
              --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
              --ignore-not-found 2>/dev/null || true

          # Create new cert using the freshly generated key from the previous step
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:/tmp/cert_key.pem \
            --p12-password codemagic \
            --p12-path /tmp/dist_cert.p12 \
            --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
            --save

          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password codemagic

      - name: Fetch or create provisioning profile
        script: |
          # Same auto-detection issue as the cert step: each Codemagic script
          # step runs in its own fresh shell, so unset from a previous step
          # doesn't carry over. fetch-signing-files also auto-detects
          # CERTIFICATE_PRIVATE_KEY for --certificate-key, so unset it here too.
          unset CERTIFICATE_PRIVATE_KEY

          # fetch-signing-files --create also needs a certificate private key
          # locally to package the signing certificate, even if a valid cert
          # already exists on Apple's side (created in the previous step).
          # /tmp/cert_key.pem is the fresh key generated in "Prepare signing
          # keys" and persists across steps on this build machine.
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number \
            "$APP_STORE_APP_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((BUILD_NUMBER + 1))

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcode-project use-profiles
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/FaisTrack.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=5GY9D93K6Y \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log
          ARCHIVE_EXIT=${PIPESTATUS[0]}
          if [ $ARCHIVE_EXIT -ne 0 ]; then
            echo "=== BUILD ERRORS ===" && grep "error:" /tmp/xcodebuild_logs/archive.log | grep -v "^note:" | head -60
            exit $ARCHIVE_EXIT
          fi
          xcodebuild -exportArchive \
            -archivePath /tmp/FaisTrack.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath /tmp/ipa \
            2>&1 | tee -a /tmp/xcodebuild_logs/archive.log

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
