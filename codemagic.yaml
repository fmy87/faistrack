workflows:
  ios-debug:
    name: FaisTrack iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build Debug
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild_logs/build.log; exit ${PIPESTATUS[0]}
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: FaisTrack TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
        APP_STORE_APP_ID: "6783632037"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Decode ASC private key
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8

      - name: Create iOS Distribution certificate
        script: |
          # Generate private key for the signing certificate
          openssl genrsa -out /tmp/dist_key.pem 2048

          # Create CSR
          openssl req -new \
            -key /tmp/dist_key.pem \
            -out /tmp/dist_req.csr \
            -subj "/emailAddress=fmy87@hotmail.com/CN=iPhone Distribution/C=US"

          # Submit to Apple Developer and save the .cer
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --csr-content "$(cat /tmp/dist_req.csr)" \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --save

          # Find the downloaded cert
          CER=$(find "$CM_BUILD_DIR" -name "*.cer" | head -1)
          echo "Downloaded cert: $CER"

          # Convert .cer (DER) -> .pem
          openssl x509 -inform DER -in "$CER" -out /tmp/dist_cert.pem

          # Bundle cert + private key into .p12 for keychain
          openssl pkcs12 -export \
            -inkey /tmp/dist_key.pem \
            -in /tmp/dist_cert.pem \
            -out /tmp/dist_cert.p12 \
            -passout pass:codemagic \
            -legacy

          # Add to keychain
          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password codemagic

      - name: Fetch or create provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number \
            "$APP_STORE_APP_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((BUILD_NUMBER + 1))

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
