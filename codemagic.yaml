workflows:
  ios-debug:
    name: FaisTrack iOS Debug
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install
      - name: Build Debug
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcodebuild_logs/build.log; exit ${PIPESTATUS[0]}
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  ios-testflight:
    name: FaisTrack TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_SCHEME: "FaisTrack"
        BUNDLE_ID: "com.faistrack.app"
        APP_STORE_APP_ID: "6783632037"
      groups:
        - faistrack
    scripts:
      - name: Install GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > $CM_BUILD_DIR/FaisTrack/Supporting/GoogleService-Info.plist

      - name: Set up keychain
        script: |
          keychain initialize

      - name: Prepare signing keys
        script: |
          # Decode ASC API key
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8

          # NOTE: We intentionally do NOT use $CERTIFICATE_PRIVATE_KEY anymore.
          # Diagnostics showed the stored value decodes to a well-formed PEM
          # (correct BEGIN/END markers, plausible byte length) but fails
          # `openssl rsa -check` with a p*q != n error — the key bytes
          # themselves are corrupted, not just mis-encoded. Since this
          # workflow already deletes and recreates the distribution
          # certificate on every build (see next step), there's no need for
          # a persisted private key at all: we let `certificates create`
          # generate a fresh key pair itself each run.


      - name: Setup iOS Distribution certificate
        script: |
          ASC_KEY="@file:/tmp/asc_key.p8"
          KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          ISS_ID="$APP_STORE_CONNECT_ISSUER_ID"

          # /tmp/cert_key.pem is no longer used — see "Prepare signing keys" note above.

          # Delete any existing IOS_DISTRIBUTION certs (ignore errors if none exist)
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
            --json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(x['id']) for x in (d if isinstance(d,list) else d.get('data',[]))]" 2>/dev/null \
            | xargs -I{} app-store-connect certificates delete "{}" \
              --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
              --ignore-not-found 2>/dev/null || true

          # Create new cert — let the CLI generate a fresh private key itself
          # (no --certificate-key), since we recreate this cert every build anyway.
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --p12-password codemagic \
            --p12-path /tmp/dist_cert.p12 \
            --private-key $ASC_KEY --key-id "$KEY_ID" --issuer-id "$ISS_ID" \
            --save

          keychain add-certificates \
            --certificate /tmp/dist_cert.p12 \
            --certificate-password codemagic

      - name: Fetch or create provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR && pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number \
            "$APP_STORE_APP_ID" \
            --private-key @file:/tmp/asc_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((BUILD_NUMBER + 1))

      - name: Build IPA
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcode-project use-profiles
          xcodebuild \
            -workspace "$CM_BUILD_DIR/FaisTrack.xcworkspace" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/FaisTrack.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=5GY9D93K6Y \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log
          ARCHIVE_EXIT=${PIPESTATUS[0]}
          if [ $ARCHIVE_EXIT -ne 0 ]; then
            echo "=== BUILD ERRORS ===" && grep "error:" /tmp/xcodebuild_logs/archive.log | grep -v "^note:" | head -60
            exit $ARCHIVE_EXIT
          fi
          xcodebuild -exportArchive \
            -archivePath /tmp/FaisTrack.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath /tmp/ipa \
            2>&1 | tee -a /tmp/xcodebuild_logs/archive.log

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
